<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREE AI GAMES</title>
    <style>
        /* Dark Theme Setup */
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 50px;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }

        /* Responsive Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, 200px);
            gap: 30px;
            padding: 40px;
            justify-content: center;
            max-width: 1200px;
        }

        /* Thumbnail Styling */
        .game-card {
            width: 200px;
            height: 200px;
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid #333;
            text-decoration: none;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85); /* Slightly darker for better contrast */
            padding: 10px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            backdrop-filter: blur(5px);
            color: #ffffff;            /* Changed to White */
            text-transform: uppercase; /* Changed to Capitals */
            letter-spacing: 1px;
        }

        /* Subtle Background Animation */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <h1>FREE AI GAMES</h1>

    <div class="grid-container">

        <a target="_blank" rel="noopener noreferrer" href="https://kingsescapegame.onrender.com" class="game-card">
            <img src="images/kingsescape.jpg" alt="Game 1">

        </a>

        <a target="_blank" rel="noopener noreferrer" href="https://md19811.github.io/WorldElimination/" class="game-card">
            <img src="images/worldelimination.jpg" alt="Game 2">

        </a>

        <a target="_blank" rel="noopener noreferrer" href="https://md19811.github.io/MemoryMaster/" class="game-card">
		            <img src="images/memorymaster.jpg" alt="Game 2">

        </a>
        <a target="_blank" rel="noopener noreferrer" href="https://md19811.github.io/Manillen/" class="game-card">
				            <img src="images/manillen.jpg" alt="Game 2">

        </a>
        <a target="_blank" rel="noopener noreferrer" href="https://md19811.github.io/SexBombDetective/" class="game-card">
						            <img src="images/sexbombdetective.jpg" alt="Game 2">

        </a>



    </div>

</body>
</html>
